apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-guestbook-appset
  namespace: argocd

spec:
  generators:
  - git:
      repoURL: https://github.com/nimya2007/argocd-example-apps.git
      revision: master
      directories:
      - path: envs/*

  template:
    metadata:
      name: helm-guestbook-{{path.basename}}

    spec:
      project: poc-demo

      source:
        repoURL: https://github.com/nimya2007/argocd-example-apps.git
        targetRevision: master
        path: helm-guestbook
        helm:
          valueFiles:
          - "../envs/{{path.basename}}/values.yaml"

      destination:
        server: https://kubernetes.default.svc
        namespace: "{{path.basename}}-guestbook"

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
