apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-guestbook
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io

spec:
  project: poc-demo

  source:
    repoURL: https://github.com/nimya2007/argocd-example-apps.git
    targetRevision: master
    path: helm-guestbook

  destination:
    server: https://kubernetes.default.svc
    namespace: demo-helm-guestbook

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true